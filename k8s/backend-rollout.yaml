apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ecommerce-backend
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-backend
  template:
    metadata:
      labels:
        app: ecommerce-backend
    spec:
      containers:
        - name: ecommerce-backend
          image: phanphan1504/ecommerce-backend:latest
          ports:
            - containerPort: 8080
          env:
            # ✅ CHO PHÉP FRONTEND PORT BẤT KỲ (VÍ DỤ 30090)
            - name: ALLOWED_ORIGINS
              value: "http://localhost:3000,http://localhost:30080,http://localhost:30090,http://vshop.local"
            - name: DB_HOST
              value: "postgres"
            - name: DB_NAME
              value: "E_Commerence_DB"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: JWT_SECRET
              value: "VDB6clpTMU1YMDFPTTBaUFVVUkpSVUZVUWtkVFJWSlVWRUZVUlZKVVZFMA=="
  strategy:
    blueGreen: 
      activeService: ecommerce-backend-active
      previewService: ecommerce-backend-preview
      autoPromotionEnabled: true
