apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ecommerce-backend
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-backend
  template:
    metadata:
      labels:
        app: ecommerce-backend
    spec:
      containers:
        - name: ecommerce-backend
          image: phanphan1504/ecommerce-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "postgres" # Tên service của Postgres trong K8s
            - name: DB_NAME
              value: "E_Commerence_DB"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: JWT_SECRET
              value: "VDB6clpTMU1YMDFPTTBaUFVVUkpSVUZVUWtkVFJWSlVWRUZVUlZKVVZFMA=="
            - name: APP_BASE_URL
              value: "http://localhost:8081"
  strategy:
    blueGreen: 
      activeService: ecommerce-backend-active
      previewService: ecommerce-backend-preview
      autoPromotionEnabled: true
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-active
  namespace: ecommerce
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30085
  selector:
    app: ecommerce-backend
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-preview
  namespace: ecommerce
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: ecommerce-backend
