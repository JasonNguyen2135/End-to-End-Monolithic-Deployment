services:
  # 1. Database
  postgres:
    image: postgres:15
    container_name: ecommerce-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d E_Commerence_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend (Java 21)
  backend:
    build:
      context: ./ecommerce-platform/backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:30080}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@vshop.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123@Password}
    depends_on:
      postgres:
        condition: service_healthy

  # 3. Frontend (React)
  frontend:
    build:
      context: ./ecommerce-platform/frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
