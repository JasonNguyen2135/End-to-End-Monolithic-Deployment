spring.application.name=backend

# PostgreSQL datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/E_Commerence_DB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT secret
jwt.secret=${JWT_SECRET:VDB6clpTMU1YMDFPTTBaUFVVUkpSVUZVUWtkVFJWSlVWRUZVUlZKVVZFMA==}

# Stripe & App URL
# BỔ SUNG LẠI BIẾN NÀY ĐỂ FIX LỖI CRASH
stripe.secretKey=${STRIPE_SECRET_KEY:dummy_key}
app.base-url=${APP_BASE_URL:http://localhost:8081}

# Payment config
payment.session.ttl.minutes=60
payment.expire-check-cron=0 */1 * * * *

debug=false
