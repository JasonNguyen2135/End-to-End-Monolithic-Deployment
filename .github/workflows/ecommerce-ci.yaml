name: Ecommerce Monolith CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ecommerce-platform/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Quan trọng cho SonarQube

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Quét chất lượng code với SonarQube
      - name: Build and Analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          cd ecommerce-platform/backend
          mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=ecommerce-monolith-backend -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Scan Backend
      - name: Build Backend image
        run: |
          cd ecommerce-platform/backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }} .

      - name: Run Trivy for Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}

      # Build & Scan Frontend
      - name: Build Frontend image
        run: |
          cd ecommerce-platform/frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:${{ github.sha }} .

      - name: Run Trivy for Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:${{ github.sha }}

      # GitOps Update
      - name: Update Kubernetes Manifests
        run: |
          sed -i "s|image: .*/ecommerce-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}|g" k8s/backend-rollout.yaml
          sed -i "s|image: .*/ecommerce-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          git add k8s/
          git commit -m "chore: update images to ${{ github.sha }} [skip ci]"
          git push

      # Thông báo Slack (Luôn chạy dù thành công hay thất bại)
      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: 'Ecommerce Deploy Status: ${{ job.status }}'
          SLACK_MESSAGE: 'Deployment of version ${{ github.sha }} completed with status: ${{ job.status }} 🚀'
