apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-active
  namespace: ecommerce
spec:
  selector:
    app: ecommerce-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-preview
  namespace: ecommerce
spec:
  selector:
    app: ecommerce-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
