apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ecommerce-backend
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-backend
  template:
    metadata:
      labels:
        app: ecommerce-backend
    spec:
      containers:
        - name: ecommerce-backend
          image: phanphan1504/ecommerce-backend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 35
            periodSeconds: 10
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/E_Commerence_DB
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: JWT_SECRET
              value: "${JWT_SECRET}"
  strategy:
    blueGreen: 
      activeService: ecommerce-backend-active
      previewService: ecommerce-backend-preview
      autoPromotionEnabled: true
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-active
  namespace: ecommerce
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30085
  selector:
    app: ecommerce-backend
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-preview
  namespace: ecommerce
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: ecommerce-backend
