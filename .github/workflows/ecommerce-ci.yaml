name: Ecommerce Monolith CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ecommerce-platform/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Scan Backend
      - name: Build Backend image
        run: |
          cd ecommerce-platform/backend
          mvn clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}

      # Build & Scan Frontend
      - name: Build Frontend image
        run: |
          cd ecommerce-platform/frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:${{ github.sha }}

      # GitOps Update: Đẩy thay đổi sang nhánh RIÊNG BIỆT
      - name: Update Kubernetes Manifests
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "CI Bot"
          
          # Tạo hoặc chuyển sang nhánh gitops-deploy
          git checkout -b gitops-deploy || git checkout gitops-deploy
          
          # Sửa file YAML
          sed -i "s|image: .*/ecommerce-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}|g" k8s/backend-rollout.yaml
          sed -i "s|image: .*/ecommerce-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:${{ github.sha }}|g" k8s/frontend-rollout.yaml
          
          git add k8s/
          git commit -m "deploy: update images to ${{ github.sha }}" || echo "No changes"
          
          # Đẩy lên nhánh gitops-deploy (Ép buộc để ghi đè lịch sử triển khai)
          git push origin gitops-deploy --force

      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: 'Ecommerce Deploy Triggered'
          SLACK_MESSAGE: 'Code on main has been built. Manifests updated on gitops-deploy branch. 🚀'
